spring:
  application:
    name: Jjigeojulge

  config:
    import: optional:file:.env[.properties]

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

  # OAuth ClientRegistration Config
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-name: kakao
            client-id: ${KAKAO_REST_API_KEY}
            client-secret: ${KAKAO_CLIENT_SECRET}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseScheme}://{baseHost}{basePort}{basePath}/login/oauth2/code/{registrationId}"
            scope:
              - profile_nickname
              - profile_image
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

logging:
  level:
    root: info

security:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expire: ${JWT_ACCESS_TOKEN_EXPIRE:3600000}
    refresh-token-expire: ${JWT_REFRESH_TOKEN_EXPIRE:1209600000}
    register-token-expire: ${JWT_REGISTER_TOKEN_EXPIRE:1800000}

server:
  forward-headers-strategy: framework

kakao:
  client-id: ${KAKAO_CLIENT_ID}
  redirect-uri: ${KAKAO_REDIRECT_URI}
  token-uri: https://kauth.kakao.com/oauth/token
  user-info-uri: https://kapi.kakao.com/v2/user/me

sse:
  timeout: 300_000

app:
  frontendUrl: https://app.snapforyou.cloud/
